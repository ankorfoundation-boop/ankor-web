<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ANKOR | Official Site</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg: #ffffff;
            --text: #000000;
            --text-muted: #666666;
            --black: #000000;
            --white: #ffffff;
            --light-gray: #f5f5f5;
            --border: #e0e0e0;
            --error: #ff0000;
            --transition-strong: 0.8s cubic-bezier(0.25, 1, 0.2, 1);
            --transition-smooth: 0.3s ease;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            width: 100vw;
        }

        /* --- ANNOUNCEMENT BAR --- */
        .announcement-bar { background: var(--black); color: var(--white); height: 40px; display: flex; align-items: center; justify-content: center; position: relative; z-index: 1000; font-size: 0.75rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
        .announcement-track { display: flex; width: 100%; max-width: 600px; overflow: hidden; position: relative; height: 100%; align-items: center; justify-content: center; }
        .ticket { position: absolute; width: 100%; text-align: center; opacity: 0; transform: translateY(10px); transition: opacity 0.4s ease, transform 0.4s ease; }
        .ticket.active { opacity: 1; transform: translateY(0); }
        .ann-arrow { background: none; border: none; color: white; cursor: pointer; padding: 0 15px; font-size: 1rem; position: absolute; z-index: 10; }
        .ann-prev { left: 10px; }
        .ann-controls-right { position: absolute; right: 10px; display: flex; align-items: center; gap: 5px; z-index: 10; }
        .ann-controls-right .ann-arrow { position: relative; right: auto; padding: 0 5px; }

        /* --- HEADER & NAVIGATION --- */
        header { position: sticky; top: 0; width: 100%; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); z-index: 999; display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; padding: 0 30px; height: 70px; }
        .header-left { display: flex; align-items: center; }
        .header-center { display: flex; justify-content: center; }
        .header-right { display: flex; justify-content: flex-end; align-items: center; gap: 20px; }
        .logo { font-size: 1.8rem; font-weight: 900; letter-spacing: -2px; cursor: pointer; text-transform: uppercase; color: var(--black); white-space: nowrap; }
        .desktop-nav { display: none; gap: 30px; }
        .nav-link { text-decoration: none; color: var(--black); font-weight: 700; font-size: 0.85rem; letter-spacing: 1px; text-transform: uppercase; transition: color var(--transition-smooth); position: relative; cursor: pointer; }
        .nav-link::after { content: ''; position: absolute; width: 0; height: 2px; bottom: -5px; left: 0; background-color: var(--black); transition: width 0.3s ease; }
        .nav-link:hover::after, .nav-link.active::after { width: 100%; }
        .hamburger { display: block; cursor: pointer; border: none; background: none; font-size: 1.5rem; color: var(--black); }
        
        /* --- HEADER ICONS --- */
        .header-icons-container { display: flex; align-items: center; gap: 15px; }
        .header-icon-btn { background: none; border: none; font-size: 1.25rem; color: var(--black); cursor: pointer; position: relative; transition: transform 0.2s; display: flex; align-items: center; justify-content: center;}
        .header-icon-btn:hover { transform: scale(1.1); }
        .cart-badge { position: absolute; top: -5px; right: -8px; background: var(--black); color: var(--white); font-size: 0.65rem; font-weight: 900; width: 16px; height: 16px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .header-avatar { width: 30px; height: 30px; border-radius: 50%; object-fit: cover; cursor: pointer; border: 1px solid var(--border); transition: transform 0.2s; }
        .header-avatar:hover { transform: scale(1.05); }

        /* --- USER DROPDOWN --- */
        .user-dropdown-window { position: absolute; top: 75px; right: 30px; background: var(--white); border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-radius: 12px; width: 260px; padding: 20px; display: none; flex-direction: column; z-index: 1000; opacity: 0; transform: translateY(-10px); transition: all 0.3s ease; }
        .user-dropdown-window.active { display: flex; opacity: 1; transform: translateY(0); }
        .ud-close { position: absolute; top: 10px; right: 15px; background: none; border: none; font-size: 1.2rem; cursor: pointer; color: var(--text-muted); }
        .ud-header { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 15px; }
        .ud-avatar-container { position: relative; }
        .ud-avatar { 
            width: 80px; 
            height: 80px; 
            border-radius: 50%; 
            object-fit: cover; 
            border: 3px solid var(--black);
        }
        .camera-icon-btn { 
            position: absolute; 
            bottom: 4px; 
            right: 4px; 
            background: #666666; 
            color: var(--white); 
            border: none; 
            border-radius: 50%; 
            width: 32px; 
            height: 32px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 1rem; 
            box-shadow: 0 3px 8px rgba(0,0,0,0.3); 
            cursor: pointer; 
            transition: background 0.2s, transform 0.2s; 
        }
        .camera-icon-btn:hover { 
            background: #333333; 
            transform: scale(1.15); 
        }
        .ud-greeting { font-weight: 900; font-size: 1.1rem; color: var(--black); }
        .ud-logout { display: flex; align-items: center; justify-content: flex-end; gap: 8px; background: none; border: none; cursor: pointer; color: var(--text-muted); font-size: 0.85rem; font-weight: 700; transition: color 0.2s; align-self: flex-end; }
        .ud-logout:hover { color: var(--black); }

        /* --- CART SIDEBAR --- */
        .cart-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2000; display: none; opacity: 0; transition: opacity 0.4s ease; }
        .cart-overlay.active { display: block; opacity: 1; }
        .cart-sidebar { position: fixed; top: 0; right: -100%; width: 100%; max-width: 450px; height: 100vh; background: var(--white); z-index: 2001; display: flex; flex-direction: column; box-shadow: -10px 0 30px rgba(0,0,0,0.1); transition: right 0.4s cubic-bezier(0.25, 1, 0.5, 1); }
        .cart-sidebar.open { right: 0; }
        .cs-header { display: flex; align-items: center; justify-content: space-between; padding: 25px 30px; border-bottom: 1px solid var(--border); }
        .cs-title { font-weight: 900; font-size: 1.2rem; color: var(--black); letter-spacing: -0.5px; }
        .cs-close { background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--black); }
        .cs-body { flex: 1; overflow-y: auto; padding: 20px 30px; display: flex; flex-direction: column; gap: 20px; }
        .cs-empty { text-align: center; color: var(--text-muted); margin-top: 40px; font-weight: 500; font-size: 0.95rem; }
        .cs-item { display: flex; align-items: center; gap: 15px; border-bottom: 1px solid var(--light-gray); padding-bottom: 15px; position: relative; }
        .cs-item-img { width: 70px; height: 70px; object-fit: cover; border-radius: 12px; }
        .cs-item-info { flex: 1; display: flex; flex-direction: column; justify-content: center; }
        .cs-item-name { font-weight: 700; font-size: 0.85rem; color: var(--black); margin-bottom: 5px; line-height: 1.2; padding-right: 25px; }
        .cs-item-price { font-weight: 400; font-size: 0.9rem; color: var(--text-muted); margin-bottom: 8px; }
        .cs-qty-control { display: inline-flex; align-items: center; border: 1px solid var(--border); border-radius: 20px; height: 32px; width: 90px; padding: 0 10px; background: var(--white); }
        .cs-qty-btn { background: none; border: none; color: var(--black); font-size: 0.8rem; cursor: pointer; padding: 5px; display: flex; align-items: center; justify-content: center; }
        .cs-qty-val { font-weight: 700; font-size: 0.85rem; color: var(--black); width: 20px; text-align: center; }
        .cs-remove { position: absolute; top: 0; right: 0; background: none; border: none; color: var(--black); cursor: pointer; font-size: 1rem; transition: color 0.2s; }
        .cs-remove:hover { color: #d9534f; }
        .cs-footer { padding: 25px 30px; border-top: 1px solid var(--border); background: var(--light-gray); }
        .cs-total-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; font-weight: 900; font-size: 1.1rem; color: var(--black); }
        .cs-checkout-btn { width: 100%; background: var(--black); color: var(--white); border: none; padding: 18px; font-weight: 900; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; transition: background 0.2s; }
        .cs-checkout-btn:hover { background: #333; }

        .mobile-menu { position: fixed; top: 0; left: -100%; width: 80%; max-width: 400px; height: 100vh; background: var(--white); z-index: 2000; padding: 80px 30px 30px; box-shadow: 20px 0 50px rgba(0,0,0,0.1); transition: left 0.4s cubic-bezier(0.25, 1, 0.5, 1); display: flex; flex-direction: column; gap: 25px; }
        .mobile-menu.open { left: 0; }
        .mobile-menu .nav-link { font-size: 1.5rem; letter-spacing: -0.5px; }
        .close-menu { position: absolute; top: 20px; right: 25px; font-size: 2rem; background: none; border: none; cursor: pointer; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1500; }
        .overlay.active { display: block; }
        @media (min-width: 768px) { .desktop-nav { display: flex; } .hamburger { display: none; } }

        .view { display: none; animation: fadeIn 0.5s ease forwards; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        @keyframes doubleJump { 0%, 100% { transform: translateY(0); } 25% { transform: translateY(-12px) scale(1.1); } 50% { transform: translateY(0) scale(1); } 75% { transform: translateY(-8px) scale(1.1); } }
        .cart-double-jump { animation: doubleJump 0.6s ease; }

        /* --- HERO SLIDER --- */
        .hero-section { position: relative; width: 100%; height: calc(100vh - 110px); overflow: hidden; background: #111; }
        .hero-slide { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; background-position: center; transform: translateX(100%); transition: transform var(--transition-strong); display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .hero-slide.active { transform: translateX(0); z-index: 2; }
        .hero-slide::before { content: ''; position: absolute; top:0; left:0; width:100%; height:100%; background: linear-gradient(to top, rgba(0,0,0,0.8), rgba(0,0,0,0.2)); z-index: 0; }
        .hero-content { position: relative; z-index: 10; padding: 20px; color: var(--white); }
        .hero-title { font-size: clamp(3rem, 8vw, 6rem); font-weight: 900; letter-spacing: -2px; text-transform: uppercase; margin-bottom: 10px; text-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .hero-subtitle { font-size: clamp(1rem, 2vw, 1.5rem); font-weight: 500; margin-bottom: 40px; text-shadow: 0 5px 15px rgba(0,0,0,0.8); }
        .btn-mas-info { display: inline-flex; align-items: center; justify-content: center; background: var(--black); color: var(--white); padding: 18px 40px; font-size: 0.9rem; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; text-decoration: none; border-radius: 4px; transition: all var(--transition-smooth); border: 1px solid rgba(255,255,255,0.1); cursor: pointer; }
        .btn-mas-info span.text { position: relative; }
        .btn-mas-info span.arrow { display: inline-block; opacity: 0; width: 0; overflow: hidden; transform: translateX(-10px); transition: all 0.3s ease; }
        .btn-mas-info:hover span.text { text-decoration: underline; text-underline-offset: 4px; }
        .btn-mas-info:hover span.arrow { opacity: 1; width: 20px; transform: translateX(8px); }
        .btn-mas-info:hover { background: #111; transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .slider-controls { position: absolute; top: 50%; left: 0; width: 100%; transform: translateY(-50%); display: flex; justify-content: space-between; padding: 0 20px; z-index: 20; pointer-events: none; }
        .slider-arrow { pointer-events: auto; width: 50px; height: 50px; border-radius: 50%; background: rgba(255,255,255,0.15); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.3); color: white; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; cursor: pointer; transition: all 0.3s ease; }
        .slider-arrow:hover { background: rgba(255,255,255,0.3); transform: scale(1.1); }
        @media (max-width: 768px) { .slider-controls { padding: 0 5px; } .slider-arrow { width: 38px; height: 38px; font-size: 1rem; } }

        /* --- SECTIONS LAYOUT --- */
        .section-container { max-width: 1400px; margin: 0 auto; padding: 80px 20px; width: 100%; }
        .section-title { text-align: center; font-size: 2.5rem; font-weight: 900; text-transform: uppercase; letter-spacing: -1.5px; margin-bottom: 5px; }
        .section-subtitle { text-align: center; font-size: 1.1rem; font-weight: 500; color: var(--text-muted); margin-bottom: 50px; }

        /* --- ACCOUNT/REGISTER VIEW --- */
        .account-page-wrapper { max-width: 450px; margin: 0 auto; padding: 40px 20px; display: flex; flex-direction: column; align-items: center; }
        .account-page-logo { width: 100%; max-width: 150px; height: auto; margin-bottom: 40px; object-fit: contain; }
        .account-page-form { width: 100%; display: flex; flex-direction: column; gap: 20px; }
        .ap-input-group { display: flex; flex-direction: column; gap: 8px; position: relative; }
        .ap-input-group label { font-size: 0.8rem; font-weight: 900; color: var(--black); letter-spacing: 0.5px; }
        .ap-input { width: 100%; border: 1px solid var(--border); padding: 16px 15px; font-family: 'Inter', sans-serif; font-size: 0.9rem; outline: none; transition: all 0.3s; background: var(--light-gray); }
        .ap-input::placeholder { color: gray; }
        .ap-input:focus { border-color: var(--black); background: var(--white); }
        .ap-input.input-error { border-color: var(--error) !important; background: #fffcfc; }
        .error-hint { color: var(--error); font-size: 0.75rem; font-weight: 600; margin-top: 2px; display: none; }
        .pw-group { position: relative; }
        .ap-eye { 
            position: absolute; 
            top: 40px; 
            right: 15px; 
            background: none; 
            border: none; 
            color: gray; 
            cursor: pointer; 
            font-size: 1.1rem; 
        }
        .ap-submit { background: var(--black); color: var(--white); border: none; padding: 18px; font-weight: 900; text-transform: uppercase; font-size: 0.9rem; margin-top: 15px; cursor: pointer; transition: background 0.3s; letter-spacing: 1px; width: 100%; }
        .ap-submit:hover { background: #333; }

        /* --- LOGOUT CONFIRM MODAL --- */
        .logout-modal-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.6); z-index: 4000; display: none; 
            align-items: center; justify-content: center; 
        }
        .logout-modal-overlay.active { display: flex; }
        .logout-modal { 
            background: var(--white); width: 90%; max-width: 380px; 
            border-radius: 16px; padding: 35px 30px; text-align: center; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.2); border: 1px solid var(--border);
        }
        .logout-modal p { font-size: 1.1rem; font-weight: 700; margin-bottom: 30px; line-height: 1.4; }
        .logout-buttons { display: flex; gap: 15px; }
        .logout-buttons button { 
            flex: 1; padding: 16px; font-weight: 900; text-transform: uppercase; 
            font-size: 0.9rem; letter-spacing: 1px; border: none; border-radius: 8px; 
            cursor: pointer; transition: all 0.2s;
        }
        .logout-no { background: var(--black); color: var(--white); }
        .logout-yes { background: var(--black); color: var(--white); }

        /* Resto de estilos (social, store, product, newsletter, etc.) permanecen igual */
        /* ... (mantengo todos los estilos que enviaste sin cambios) ... */

        footer { text-align: center; padding: 40px; border-top: 1px solid var(--border); font-size: 0.8rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; margin-top: 60px; }
    </style>
</head>
<body>

    <!-- Todo el HTML que enviaste se mantiene igual, solo se actualizó el dropdown y los botones de ojo -->

    <div class="user-dropdown-window" id="userDropdown">
        <button class="ud-close" onclick="closeUserDropdown()">&times;</button>
        <div class="ud-header">
            <div class="ud-avatar-container">
                <img src="" id="ud-avatar-img" class="ud-avatar" alt="Avatar">
                <button class="camera-icon-btn" onclick="triggerProfilePicUpload()" title="Cambiar foto de perfil">
                    <i class="fa-solid fa-camera"></i>
                </button>
            </div>
            <div class="ud-greeting" id="ud-greeting-text">¡Hola!</div>
        </div>
        <button class="ud-logout" onclick="showLogoutModal()"><i class="fa-solid fa-door-open"></i> Cerrar sesión</button>
    </div>

    <!-- El resto del HTML es exactamente el mismo que enviaste -->

    <section id="view-account" class="view section-container">
        <div class="account-page-wrapper">
            <img src="https://images.squarespace-cdn.com/content/v1/5f4039328246f40954f67606/1598031252118-W6P1P0N9Z7XN96Z9X2PZ/ANKOR_LOGO_WHITE.png" alt="ANKOR" class="account-page-logo">
            
            <!-- REGISTRO -->
            <div id="registerContainer">
                <form class="account-page-form" id="registerForm" onsubmit="handleAccountCreation(event)" novalidate>
                    <!-- ... campos nombre, apellido, email ... -->
                    <div class="ap-input-group pw-group" id="group_password">
                        <label>CONTRASEÑA</label>
                        <input type="password" id="reg_password" class="ap-input" placeholder="Cree una contraseña (mín. 8 caracteres)">
                        <button type="button" class="ap-eye" onclick="togglePasswordVisibility(this)"><i class="fa-regular fa-eye" id="eyeIcon"></i></button>
                        <span class="error-hint" id="hint_password">Límite de caracteres alcanzado (20 caracteres)</span>
                    </div>
                    <button type="submit" class="ap-submit">CREAR CUENTA ANKOR</button>
                </form>
                
                <p style="text-align: center; margin: 25px 0 10px; font-size: 0.9rem; color: var(--text-muted);">
                    <span onclick="switchToLoginMode()" style="font-weight: 700; text-decoration: underline; cursor: pointer; color: var(--black);">¿Ya tienes una cuenta?</span>
                </p>
            </div>

            <!-- LOGIN -->
            <div id="loginContainer" style="display: none; width: 100%;">
                <form class="account-page-form" id="loginForm" onsubmit="handleLogin(event)" novalidate>
                    <div class="ap-input-group">
                        <label>CORREO ELECTRÓNICO</label>
                        <input type="email" id="login_email" class="ap-input" placeholder="Escriba su correo de ANKOR">
                        <span class="error-hint" id="login_hint_email" style="display:none;">Ingrese un correo electrónico válido.</span>
                    </div>
                    <div class="ap-input-group pw-group">
                        <label>CONTRASEÑA</label>
                        <input type="password" id="login_password" class="ap-input" placeholder="Ingrese su contraseña ANKOR">
                        <button type="button" class="ap-eye" onclick="toggleLoginPasswordVisibility(this)"><i class="fa-regular fa-eye" id="loginEyeIcon"></i></button>
                    </div>
                    <button type="submit" class="ap-submit">INICIAR SESIÓN ANKOR</button>
                </form>
                
                <p style="text-align: center; margin-top: 20px; font-size: 0.9rem;">
                    <span onclick="switchToRegisterMode()" style="font-weight: 700; text-decoration: underline; cursor: pointer;">¿No tienes una cuenta? Crear cuenta ANKOR</span>
                </p>
            </div>
        </div>
    </section>

    <!-- Resto del HTML (cart, modales, footer, etc.) igual que lo enviaste -->

    <div id="toast" class="toast"><i class="fa-solid fa-circle-check" style="color: #4CAF50;"></i><span id="toast-msg"></span></div>
    <input type="file" id="profile-upload" accept="image/*" style="display: none;" onchange="handleProfilePicUpload(event)">

    <script>
        /* === FUNCIONES DE CONTRASEÑA (CORREGIDAS) === */
        function togglePasswordVisibility(btn) {
            const input = btn.previousElementSibling;
            const icon = btn.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        function toggleLoginPasswordVisibility(btn) {
            const input = btn.previousElementSibling;
            const icon = btn.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        /* El resto del script (persistente, carrito, foto de perfil, etc.) se mantiene igual que en tu versión */

        window.onload = () => {
            renderProducts();
            populateCountryList();
            checkContactBlock(); 
            checkNewsletterLock();
            loadPersistentData();
        };
    </script>
</body>
</html>
